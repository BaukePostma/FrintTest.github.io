<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>FRINT Form</title>
  <link rel="icon" href="StolenIconSorryMarissa.ico" type="image/x-icon">
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">

      <div class="card shadow-sm">
        <div class="card-body p-4">

          <h1 class="text-center mb-4">🥤 FRINT FORM</h1>

          <form id="frintForm">

            <div class="mb-3">
              <label for="fnameInput" class="form-label">Name</label>
              <input
                required
                type="text"
                class="form-control"
                id="fnameInput"
                name="entry.802430831"
                placeholder="John">
            </div>

            <div class="mb-3">
              <label for="fPhoneInput" class="form-label">Phone number</label>
              <input
                required
                type="tel"
                class="form-control"
                id="fPhoneInput"
                name="entry.1798316199"
                placeholder="06-11111111">
            </div>

            <div class="mb-3">
              <label for="fMailInput" class="form-label">Email</label>
              <input
                required
                type="email"
                class="form-control"
                id="fMailInput"
                name="entry.1743899247"
                placeholder="john.doe@example.com">
            </div>

            <div class="mb-3">
              <label for="fdrinkInput" class="form-label">Drink</label>
              <select
                required
                class="form-select"
                id="fdrinkInput"
                name="entry.1483892094">
                <option value="">Choose a drink...</option>
                <option value="Coke">Coke</option>
                <option value="Fanta">Fanta</option>
                <option value="Sprite">Sprite</option>
              </select>
            </div>

            <div class="mb-4">
              <label for="fAmountInput" class="form-label">Amount</label>
              <input
                required
                type="number"
                min="1"
                class="form-control"
                id="fAmountInput"
                name="entry.2009469748"
                placeholder="2">
            </div>

            <div id="sending"
                 class="alert alert-info d-none"
                 role="alert">
              Sending...
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Submit
            </button>

          </form>

        </div>
      </div>

      <div class="card mt-3 border-0 bg-transparent">
        <div class="card-body px-0">

          <div class="alert alert-secondary">
            <strong>Privacy notice</strong><br>
            When you press submit, a cookie stores your name,
            phone number, email and drink choice for 30 days.
          </div>

          <p class="text-muted small">
            Please wait a second after pressing submit, until a notification appears. Maybe even 10 seconds.
            Google Sheets can be slow, especially on a free account....
          </p>

        </div>
      </div>

    </div>
  </div>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>

  const form = document.getElementById("frintForm");

  form.addEventListener("submit", async (e) => {
    console.log('submit fired')
    e.preventDefault();

    let nameValue = document.getElementById("fnameInput").value;
    let phoneValue = document.getElementById("fPhoneInput").value;
    let emailValue = document.getElementById("fMailInput").value;
    let drinkValue = document.getElementById("fdrinkInput").value;
    let amountValue = document.getElementById("fAmountInput").value;

    const data = {
      name: nameValue,
      phone: phoneValue,
      email: emailValue,
      drink: drinkValue,
      amount: amountValue
    };
    for (const key in data) {
      setCookie(key, data[key]);
    }

    try {
      const response = await fetch(
        "https://script.google.com/macros/s/AKfycbweb9Xke4p5C3o5ZO-lDg0dQZ-KocOtw6HaTn-NK7D49J9Hzx8lbI3VuT3TwCHzBX6fWA/exec",
        {
          method: "POST",
          body: JSON.stringify(data)
        }
      );

      document.getElementById("sending").style.visibility = "visible";
      const result = await response.json();

      if (result.success) {
        alert("Form submitted!");
        form.reset();
      } else {
        alert("Error: " + result.error);
      }
    document.getElementById("sending").style.visibility = "visible";
    } catch (err) {
      alert("Network error: " + err.message);
    }
  });


  function setCookie(cookieName, cookieValuue) {
    const d = new Date();
    d.setTime(d.getTime() + (30 * 24 * 60 * 60 * 1000)); //wtf javascript? This just means 30 days in milliseconds.
    let expires = "expires=" + d.toUTCString();
    console.log('setting cookie: ' + cookieName + "=" + cookieValuue + ";" + expires + ";path=/");
    document.cookie = cookieName + "=" + cookieValuue + ";" + expires + ";path=/";
  }

  //Kan vast beter, but idgaf. als het maar werkt
 function loadCookies() {

  if (!document.cookie) {
    console.log('no cookies found');
    return;
  }
  
  console.log('cookies found: ' + document.cookie);
  let cookies = document.cookie.split(";");

  for (const cookie of cookies) {
    let cookieSplit = cookie.split("=");

    let key = cookieSplit[0].trim();
    let value = cookieSplit[1];

    console.log('loading cookie: ' + key + "=" + value);
    if (key === "name") {
      document.getElementById("fnameInput").value = value;
    }

    if (key === "phone") {
      document.getElementById("fPhoneInput").value = value;
    }

    if (key === "email") {
      document.getElementById("fMailInput").value = value;
    }

    if (key === "drink") {
      document.getElementById("fdrinkInput").value = value;
    }

    if (key === "amount") {
      document.getElementById("fAmountInput").value = value;
    }
  }
}

window.addEventListener("DOMContentLoaded", loadCookies);

</script>

</body>
</html>
